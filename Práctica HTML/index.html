<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practica HTML</title>
    <style>
        .navbar {
            background-color: white;
            text-align: center;
            padding: 10px;
            border-bottom: 1px solid black;
        }
        .btn-nav {
            font-family: 'Times New Roman'; 
            border: 1px solid black;
            background: white;
            padding: 5px 10px;
            cursor: pointer;
        }
        
        body{
            background-color: #F40008;
            margin: 0%;
        }
        p{
            color: rgb(0, 0, 0);
        }
        h4{
            color: rgb(0, 0, 0);
        }
        .linea-completa {
            border: 0;
            height: 2px;
            background-color: rgb(255, 255, 255);
        }
        .container{
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            width: 50%;
            margin: 20px auto; 
            background-color: rgb(248, 236, 236);
            border: 1px solid black;
            border-radius: 5px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1 style="color: white; text-align: center; font-size: 60px;"><img src="imagenes/images.png" alt=""></h1>

<div style="text-align: center; padding: 20px;">
